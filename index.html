<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>着信タイマー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: #f5f5f3;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 3rem 2rem; gap: 2.5rem;
  background: #fff; border-radius: 24px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  width: 100%; max-width: 360px; margin: 1.5rem;
}
.title {
  font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: #888;
}
.ring-wrap { position: relative; width: 220px; height: 220px; }
svg.ring { width: 220px; height: 220px; transform: rotate(-90deg); }
circle.bg { fill: none; stroke: #ebebeb; stroke-width: 10; }
circle.prog {
  fill: none; stroke: #1D9E75; stroke-width: 10; stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 0.3s;
}
.center-text {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%); text-align: center;
}
.countdown {
  font-size: 52px; font-weight: 300; color: #1a1a1a;
  letter-spacing: -3px; font-variant-numeric: tabular-nums;
  line-height: 1;
}
.status { font-size: 12px; color: #aaa; margin-top: 8px; letter-spacing: 0.06em; }
.vibrate-toggle {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px 18px;
  background: #f5f5f3; border-radius: 14px;
  font-size: 14px; color: #555;
}
.vibrate-toggle span { display: flex; align-items: center; gap: 8px; }
.toggle-switch { position: relative; width: 44px; height: 26px; cursor: pointer; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; inset: 0;
  background: #ddd; border-radius: 26px; transition: background 0.2s;
}
.slider::before {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
input:checked + .slider { background: #1D9E75; }
input:checked + .slider::before { transform: translateX(18px); }
.btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }
button {
  width: 100%; padding: 16px; border-radius: 14px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; font-family: inherit; border: none;
}
button:active { transform: scale(0.97); }
#startBtn { background: #1D9E75; color: #fff; }
#startBtn:hover { background: #0F6E56; }
#startBtn:disabled { background: #f0f0f0; color: #bbb; cursor: default; transform: none; }
#ringNowBtn { background: #E24B4A; color: #fff; }
#ringNowBtn:hover { background: #A32D2D; }
#ringNowBtn:disabled { background: #f0f0f0; color: #bbb; cursor: default; transform: none; }
#resetBtn { background: #f5f5f3; color: #444; }
#resetBtn:hover { background: #ebebeb; }
.no-vibrate { font-size: 11px; color: #ccc; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <span class="title">着信タイマー</span>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 220 220">
      <circle class="bg" cx="110" cy="110" r="96"/>
      <circle class="prog" id="prog" cx="110" cy="110" r="96"/>
    </svg>
    <div class="center-text">
      <div class="countdown" id="cd">1:00</div>
      <div class="status" id="st">待機中</div>
    </div>
  </div>

  <div class="vibrate-toggle">
    <span>📳 バイブレーション</span>
    <label class="toggle-switch">
      <input type="checkbox" id="vibrateToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <p class="no-vibrate" id="noVibrateNote" style="display:none;">※ このブラウザはバイブ非対応です（iPhone Safari等）</p>

  <div class="btns">
    <button id="startBtn">▶ スタート（1分後に着信）</button>
    <button id="ringNowBtn">📞 今すぐ着信音を鳴らす</button>
    <button id="resetBtn">■ 停止 / リセット</button>
  </div>
</div>

<script>
const TOTAL = 60;
const r = 96;
const circ = 2 * Math.PI * r;
const prog = document.getElementById('prog');
const cd = document.getElementById('cd');
const st = document.getElementById('st');
const startBtn = document.getElementById('startBtn');
const ringNowBtn = document.getElementById('ringNowBtn');
const resetBtn = document.getElementById('resetBtn');
const vibrateToggle = document.getElementById('vibrateToggle');
const noVibrateNote = document.getElementById('noVibrateNote');

let remaining = TOTAL;
let interval = null;
let ringing = false;
let ctx = null;
let ringInterval = null;
let vibrateInterval = null;
let melodyIndex = 0;

const canVibrate = 'vibrate' in navigator;
if (!canVibrate) {
  vibrateToggle.disabled = true;
  vibrateToggle.checked = false;
  noVibrateNote.style.display = 'block';
}

prog.style.strokeDasharray = circ;
prog.style.strokeDashoffset = 0;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}
function setDash(rem) {
  prog.style.strokeDashoffset = circ * (1 - rem / TOTAL);
}

// ぽろろん系メロディ（C5始まりの明るい着信フレーズ）
// 周波数: C5=523, E5=659, G5=784, A5=880, B5=988, C6=1047, E6=1319
const MELODY = [
  { f: 784, d: 0.12 },  // G5
  { f: 988, d: 0.12 },  // B5
  { f: 1047, d: 0.12 }, // C6
  { f: 1319, d: 0.20 }, // E6
  { f: 1047, d: 0.12 }, // C6
  { f: 988, d: 0.12 },  // B5
  { f: 784, d: 0.28 },  // G5（少し長め）
];

function unlockAudio() {
  if (ctx) return;
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
}

function playNote(freq, duration, startTime) {
  if (!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'triangle'; // triangleが柔らかくスマホっぽい
  o.frequency.setValueAtTime(freq, startTime);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(0.35, startTime + 0.01);
  g.gain.setValueAtTime(0.35, startTime + duration * 0.7);
  g.gain.linearRampToValueAtTime(0, startTime + duration);
  o.start(startTime);
  o.stop(startTime + duration + 0.05);
}

function playMelody() {
  if (!ctx || !ringing) return;
  let t = ctx.currentTime;
  for (const note of MELODY) {
    playNote(note.f, note.d, t);
    t += note.d + 0.02;
  }
  return t - ctx.currentTime; // メロディ全体の長さを返す
}

function startRingLoop() {
  if (!ringing) return;
  const melodyDuration = playMelody();
  const pauseAfter = 1.2; // メロディ後の無音（秒）
  const totalLoop = (melodyDuration + pauseAfter) * 1000;
  ringInterval = setTimeout(() => {
    if (ringing) startRingLoop();
  }, totalLoop);
}

function startVibrate() {
  if (!canVibrate || !vibrateToggle.checked) return;
  function doVibrate() {
    if (!ringing) return;
    navigator.vibrate([500, 300]);
  }
  doVibrate();
  vibrateInterval = setInterval(doVibrate, 800);
}

function stopVibrate() {
  if (vibrateInterval) { clearInterval(vibrateInterval); vibrateInterval = null; }
  if (canVibrate) navigator.vibrate(0);
}

function playRing() {
  ringing = true;
  startRingLoop();
  startVibrate();
}

function stopRing() {
  ringing = false;
  if (ringInterval) { clearTimeout(ringInterval); ringInterval = null; }
  stopVibrate();
  if (ctx) { try { ctx.close(); } catch(e){} ctx = null; }
}

function setRingingUI() {
  cd.textContent = '0:00';
  st.textContent = '着信中...';
  prog.style.stroke = '#E24B4A';
  startBtn.disabled = true;
  ringNowBtn.disabled = true;
}

function startTimer() {
  if (interval) return;
  unlockAudio();
  startBtn.disabled = true;
  ringNowBtn.disabled = true;
  st.textContent = 'カウントダウン中...';
  prog.style.stroke = '#1D9E75';
  interval = setInterval(() => {
    remaining--;
    cd.textContent = fmt(remaining);
    setDash(remaining);
    if (remaining <= 0) {
      clearInterval(interval); interval = null;
      setRingingUI();
      setDash(0);
      playRing();
    }
  }, 1000);
}

function ringNow() {
  if (ringing) return;
  unlockAudio();
  clearInterval(interval); interval = null;
  remaining = 0;
  setDash(0);
  setRingingUI();
  playRing();
}

function reset() {
  clearInterval(interval); interval = null;
  stopRing();
  remaining = TOTAL;
  cd.textContent = fmt(TOTAL);
  setDash(TOTAL);
  st.textContent = '待機中';
  prog.style.stroke = '#1D9E75';
  startBtn.disabled = false;
  ringNowBtn.disabled = false;
}

startBtn.addEventListener('click', startTimer);
ringNowBtn.addEventListener('click', ringNow);
resetBtn.addEventListener('click', reset);
setDash(TOTAL);
</script>
</body>
</html>
